server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      mvc:
        routes:
          - id: user-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/v1/users, /api/v1/users/**
          - id: batch-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/v1/batches, /api/v1/batches/**
          - id: assessment-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/v1/assessments, /api/v1/assessments/**, /api/v1/questions, /api/v1/questions/**, /api/v1/submissions, /api/v1/submissions/**, /api/v1/certificates, /api/v1/certificates/**
